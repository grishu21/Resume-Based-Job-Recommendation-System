<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Mode - JobFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

<section class="max-w-3xl mx-auto mt-12 bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-3xl font-bold mb-6 text-center">Select Mode</h2>

    <form action="{{ url_for('select_mode') }}" method="POST" class="space-y-6">
        <!-- Mode Choice -->
        <div>
            <label class="font-semibold text-gray-700">Choose Mode:</label>
            <select id="mode_choice" name="mode_choice" class="border p-2 rounded w-full" required onchange="toggleMode()">
                <option value="" disabled selected>Select a mode</option>
                <option value="Core">Core</option>
                <option value="General">General</option>
            </select>
        </div>

        <!-- Core Input -->
        <div id="core_input_div" class="hidden">
            <label class="font-semibold text-gray-700">Enter Your Mastered Skill:</label>
            <input type="text" name="mastered_skill" placeholder="e.g., Python" class="border p-2 rounded w-full">
        </div>

        <!-- General Multi-Select -->
        <div id="general_select_div" class="hidden">
            <label class="font-semibold text-gray-700">Select Your Skills:</label>
            <select name="selected_skills" multiple class="border p-2 rounded w-full h-32">
                {% for skill in all_skills %}
                    <option value="{{ skill }}">{{ skill }}</option>
                {% endfor %}
            </select>
            <p class="text-gray-500 text-sm mt-1">Hold Ctrl (Windows) or Command (Mac) to select multiple.</p>
        </div>

        <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700 transition font-semibold">
            Continue
        </button>
    </form>
</section>

<script>
    function toggleMode() {
        const mode = document.getElementById("mode_choice").value;
        document.getElementById("core_input_div").classList.toggle("hidden", mode !== "Core");
        document.getElementById("general_select_div").classList.toggle("hidden", mode !== "General");
    }
</script>

</body>
</html>
