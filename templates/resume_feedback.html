<!DOCTYPE html>
<html>
<head>
    <title>Resume Feedback</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #2c3e50; }
        .score {
            font-size: 24px;
            font-weight: bold;
            color: #27ae60;
        }
        .feedback-box {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            background: #fefefe;
        }
        .bad { color: red; }
    </style>
</head>
<body>
    <h1>Resume Feedback</h1>

    <p class="score">Overall Resume Score: {{ score }}/100</p>

    <h3>Suggestions for Improvement:</h3>
    {% if feedback %}
        {% for point in feedback %}
            <div class="feedback-box bad">⚠ {{ point }}</div>
        {% endfor %}
    {% else %}
        <p style="color: blue;">✅ Great! Your resume looks strong.</p>
    {% endif %}

    <br>
    <a href="{{ url_for('job_recommendations') }}">⬅ Back to Job Recommendations</a>
</body>
</html>
