<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Step - JobFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

<!-- Header -->
<header class="bg-blue-600 text-white p-4 shadow-md">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold">JobFinder</h1>
    </div>
</header>

<section class="max-w-3xl mx-auto mt-12 bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-3xl font-bold mb-6 text-center">Next Step</h2>

    <form action="{{ url_for('next_step') }}" method="POST" class="flex flex-col gap-4">
        <label class="font-semibold text-gray-700">What would you like to do next?</label>
        <select name="choice" class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            <option value="" disabled selected>Select an option</option>
            <option value="gap_analysis">Skill Gap Analysis & Prediction</option>
            <option value="job_recommendations">Go to Job Recommendations</option>
        </select>
        <button type="submit" class="bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition font-semibold">
            Continue
        </button>
    </form>
</section>

</body>
</html>
