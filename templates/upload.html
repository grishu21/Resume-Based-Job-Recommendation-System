<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Recommendation Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script>
      function toggleSkillInput() {
        var mode = document.getElementById("rec_mode").value;
        if (mode === "core") {
          document.getElementById("core_skills_div").style.display = "block";
          document.getElementById("general_info").style.display = "none";
        } else {
          document.getElementById("core_skills_div").style.display = "none";
          document.getElementById("general_info").style.display = "block";
        }
      }
    </script>
</head>
<body class="container py-4">
    <h1 class="mb-4">Upload Your Resume</h1>
    <form method="POST" enctype="multipart/form-data" class="row g-3">
        <div class="col-12">
            <label for="resume" class="form-label">Resume (PDF only):</label>
            <input class="form-control" type="file" id="resume" name="resume" accept=".pdf" required />
        </div>
        <div class="col-md-6">
            <label for="rec_mode" class="form-label">Recommendation Mode:</label>
            <select class="form-select" id="rec_mode" name="rec_mode" onchange="toggleSkillInput()">
                <option value="general" selected>General Based</option>
                <option value="core">Core Based</option>
            </select>
        </div>

        <div class="col-12" id="core_skills_div" style="display:none;">
            <label for="mastered_skills" class="form-label">Enter your mastered core skills (comma separated):</label>
            <input type="text" class="form-control" id="mastered_skills" name="mastered_skills" placeholder="e.g. python, machine learning, sql" />
        </div>

        <div id="general_info" class="col-12">
            <small class="text-muted">For general based mode, skills will be extracted automatically from your resume.</small>
        </div>

        <div class="col-12">
            <button class="btn btn-primary" type="submit">Next</button>
        </div>
    </form>

    <script>
        // Run on page load to set correct inputs visibility
        toggleSkillInput();
    </script>
</body>
</html>
