<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard - JobFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">JobFinder</h1>
        </div>
    </header>

    <!-- Scoreboard Section -->
    <section class="max-w-3xl mx-auto mt-12 bg-white p-8 rounded-lg shadow-md">
        <h2 class="text-3xl font-bold mb-6 text-center">Your Scoreboard</h2>

        <!-- Scores -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-gray-100 p-4 rounded-lg text-center">
                <h3 class="text-xl font-semibold mb-2">Tech Score</h3>
                <p class="text-2xl font-bold text-blue-600">{{ scoreboard.tech_score }}</p>
                <p class="text-gray-500">{{ scoreboard.tech_pct }}%</p>
            </div>
            <div class="bg-gray-100 p-4 rounded-lg text-center">
                <h3 class="text-xl font-semibold mb-2">Non-Tech Score</h3>
                <p class="text-2xl font-bold text-green-600">{{ scoreboard.nontech_score }}</p>
                <p class="text-gray-500">{{ scoreboard.nontech_pct }}%</p>
            </div>
        </div>

        <!-- Dominant Track -->
        <div class="text-center mb-6">
            <p class="text-lg">Recommended Track:</p>
            <p class="text-2xl font-bold text-purple-600">{{ scoreboard.dominant }}</p>
        </div>

        <!-- Track Selection Form -->
        <form action="{{ url_for('scoreboard') }}" method="POST" class="flex flex-col gap-4">
            <label class="font-semibold text-gray-700">Choose Your Track:</label>
            <select name="track_choice" class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                <option value="" disabled selected>Select a track</option>
                <option value="Tech">Tech</option>
                <option value="Non-Tech">Non-Tech</option>
                <option value="Tie">Tie</option>
            </select>
            <button type="submit" class="bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition font-semibold">
                Confirm Track
            </button>
        </form>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-6 text-center mt-12">
        &copy; 2025 JobFinder. All rights reserved.
    </footer>

</body>
</html>
